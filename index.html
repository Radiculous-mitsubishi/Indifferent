
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  #arg-root {
    width: 100%;
    min-height: 600px;
    background: #000;
    position: relative;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: default;
    user-select: none;
  }

  /* OFFICE LAYER — always present, visibility changes */
  #office {
    position: absolute;
    inset: 0;
    background: #000;
    transition: background 2s ease;
  }

  #office.screen-off {
    background: #050504;
  }

  /* Subtle scanline texture */
  #office::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* OFFICE ITEMS — dark mode visibility */
  .office-item {
    position: absolute;
    opacity: 0;
    transition: opacity 2s ease;
    color: #1a1a14;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
  }

  .screen-off .office-item { opacity: 1; }

  /* desk shape */
  #desk {
    bottom: 0; left: 0; right: 0; height: 180px;
    background: #0a0905;
    border-top: 1px solid #111108;
  }

  /* CHAIRS */
  #chair1 {
    bottom: 160px; left: 60px;
    width: 70px; height: 90px;
    background: #0c0b08;
    border: 1px solid #141310;
    border-radius: 4px 4px 0 0;
  }

  #chair2 {
    bottom: 155px; right: 80px;
    width: 65px; height: 85px;
    background: #0b0a07;
    border: 1px solid #131208;
    border-radius: 4px 4px 0 0;

  /* FILES — colored ones scattered around */
  .file {
    position: absolute;
    width: 38px;
    height: 26px;
    border-radius: 1px;
    transform-origin: center;
  }

  /* gray files */
  .file.gray { background: #161613; border: 1px solid #1e1e1a; }
  /* yellow files */

  /* green files */

  /* WHITEBOARD */

  #whiteboard-content {

  #name-circle {

  /* PAPER NEAR COMPUTER */

  .screen-off #cipher-paper { opacity: 1; }

  /* MONITOR */
  #monitor-wrap {
    position: absolute;
    bottom: 178px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;

  #monitor {
    width: 280px;

    background: #050505;
    border: 2px solid #1a1a1a;
    border-radius: 4px;

  #monitor-stand {

  /* SCREEN STATES */
  #screen-off-state {
    position: absolute;
    inset: 0;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #screen-on-state {
    position: absolute;
    inset: 0;

  /* Corporate boot screen */
  #boot-screen {
    position: absolute;
    inset: 0;
    background: #e8e4dc;

  #corp-logo {

    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.8s linear;

  /* Code input screen */
  #code-screen {
    position: absolute;
    inset: 0;
    background: #060c06;

  }

  #code-error {

    color: #4a1a1a;
    letter-spacing: 1px;
    height: 10px;
    transition: color 0.3s;
  }

  #code-error.show { color: #aa3333; }

  /* Hidden numbers on screen */
  .screen-number {
    position: absolute;
    font-size: 7px;
    color: #0d150d;
    font-family: 'Share Tech Mono', monospace;
    pointer-events: none;
  }

  /* TERMINAL */
  #terminal-screen {
    position: absolute;
    inset: 0;
    background: #020802;
    display: none;
    flex-direction: column;
    padding: 8px;
    overflow: hidden;
    z-index: 4;
  }

  #terminal-output {
    font-size: 7px;
    color: #1a3a1a;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1.6;
    white-space: pre;
  }

  /* POWER BUTTON */
  #power-btn {
    position: absolute;
    bottom: 6px; right: 8px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #111;
    border: 1px solid #1e1e1e;
    cursor: pointer;
    z-index: 20;
    transition: background 0.3s, box-shadow 0.3s;
  }

  #power-btn.on {
    background: #0a2a0a;
    box-shadow: 0 0 4px #1a4a1a;
  }

  /* Hidden objects in dark */
  #mug {
    position: absolute;
    bottom: 200px; right: 160px;
    width: 18px; height: 20px;
    border: 1px solid #161410;
    border-radius: 0 0 3px 3px;
    background: #0e0c09;
    opacity: 0;
    transition: opacity 2s ease;
  }

  .screen-off #mug { opacity: 1; }

  #stapler {
    position: absolute;
    bottom: 195px; left: 130px;
    width: 30px; height: 10px;
    background: #0f0e0c;
    border: 1px solid #1a1917;
    border-radius: 2px;
    opacity: 0;
    transform: rotate(15deg);
    transition: opacity 2s ease;
  }

  .screen-off #stapler { opacity: 1; }

  /* NEXT PAGE PROMPT */
  #next-page {
    display: none;
    position: absolute;
    inset: 0;
    background: #000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 30;
  }

  #next-page a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #2a4a2a;
    letter-spacing: 4px;
    text-decoration: none;
    border-bottom: 1px solid #1a3a1a;
    padding-bottom: 2px;
    animation: blink 2s infinite;
  }

  #next-page-label {
    font-size: 8px;
    color: #1a2a1a;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes flicker {
    0% { opacity: 0; }
    10% { opacity: 0.9; }
    12% { opacity: 0.2; }
    14% { opacity: 0.95; }
    16% { opacity: 0.1; }
    18% { opacity: 1; }
    100% { opacity: 1; }
  }

  @keyframes screenFlicker {
    0% { opacity: 1; }
    30% { opacity: 0.6; }
    31% { opacity: 1; }
    60% { opacity: 0.8; }
    61% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>

<script>
(function(){
  const root = document.getElementById('arg-root');
  const office = document.getElementById('office');
  const powerBtn = document.getElementById('power-btn');
  const screenOff = document.getElementById('screen-off-state');
  const bootScreen = document.getElementById('boot-screen');
  const codeScreen = document.getElementById('code-screen');
  const terminalScreen = document.getElementById('terminal-screen');
  const terminalOutput = document.getElementById('terminal-output');
  const codeInput = document.getElementById('code-input');
  const codeError = document.getElementById('code-error');
  const nextPage = document.getElementById('next-page');
  const jingleBar = document.getElementById('corp-jingle-bar');
  const officeItems = document.querySelectorAll('.office-item');
  const desk = document.getElementById('desk');

  let screenState = 'off'; // off, booting, on, terminal, done
  let jingleAudio = null;

  // Create jingle using Web Audio
  function createJingle(ctx) {
    const notes = [523, 659, 784, 1047, 880, 659];
    const times = [0, 0.12, 0.24, 0.36, 0.5, 0.62];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + times[i]);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + times[i] + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + times[i] + 0.11);
      osc.start(ctx.currentTime + times[i]);
      osc.stop(ctx.currentTime + times[i] + 0.12);
    });
  }

  function bootSequence() {
    if (screenState !== 'off') return;
    screenState = 'booting';
    powerBtn.classList.add('on');

    screenOff.style.display = 'none';

    // Flicker then show boot
    bootScreen.style.display = 'flex';
    bootScreen.style.animation = 'flicker 0.4s ease forwards';

    setTimeout(() => {
      // Play jingle
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        createJingle(ctx);
        jingleBar.style.transform = 'scaleX(1)';

        // Cut jingle abruptly at 0.8s
        setTimeout(() => {
          ctx.close();
          jingleBar.style.transition = 'none';
          jingleBar.style.transform = 'scaleX(0)';

          // Screen flicker and cut to code screen
          bootScreen.style.animation = 'screenFlicker 0.3s ease forwards';
          setTimeout(() => {
            bootScreen.style.display = 'none';
            codeScreen.style.display = 'flex';
            screenState = 'on';
            codeInput.focus();
          }, 300);
        }, 800);
      } catch(e) {
        // no audio, just proceed
        setTimeout(() => {
          bootScreen.style.display = 'none';
          codeScreen.style.display = 'flex';
          screenState = 'on';
          codeInput.focus();
        }, 1200);
      }
    }, 400);
  }

  function powerDown() {
    if (screenState === 'terminal' || screenState === 'done') return;
    screenState = 'off';
    powerBtn.classList.remove('on');
    bootScreen.style.display = 'none';
    codeScreen.style.display = 'none';
    screenOff.style.display = 'flex';
    // Let eyes adjust
    office.classList.add('screen-off');
    desk.style.opacity = '1';
  }

  powerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (screenState === 'off') {
      office.classList.remove('screen-off');
      desk.style.opacity = '0';
      setTimeout(bootSequence, 200);
    } else if (screenState === 'on') {
      powerDown();
    }
  });

  // Start powered off with office dark
  // Auto-boot after 2 seconds
  setTimeout(() => {
    office.classList.remove('screen-off');
    bootSequence();
  }, 2000);

  // CODE CHECK
  const ANSWER = 'indifferent';

  codeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = codeInput.value.trim().toLowerCase();
      if (val === ANSWER) {
        codeScreen.style.display = 'none';
        startTerminal();
      } else {
        codeError.classList.add('show');
        codeInput.value = '';
        setTimeout(() => codeError.classList.remove('show'), 2000);
      }
    }
  });

  // TERMINAL SEQUENCE
  const termLines = [
    'VERIDIA OS v4.2.1',
    'initializing secure shell...',
    'connecting to ARCHIVE_NODE_7...',
    '> auth bypass: ██████████ [OK]',
    '> decrypting employee manifest...',
    '> loading personnel files...',
    '',
    'WARNING: file integrity compromised',
    '> accessing: GAIUS.J.C / clearance L4',
    '> last login: 2019-03-14 03:41:22',
    '> status: ████████████',
    '',
    '> scanning incident_log_047.enc...',
    '> found: [REDACTED] entries',
    '> cross-referencing surveillance...',
    '',
    'ERROR: recursion limit reached',
    'ERROR: stack overflow in module auth_verify',
    'ERROR: connection unstable',
    '',
    '> dumping core to /dev/null',
    '> session terminated by remote host',
    '',
    'CONNECTION CLOSED.',
    '',
    '...',
  ];

  function startTerminal() {
    screenState = 'terminal';
    terminalScreen.style.display = 'flex';
    terminalOutput.textContent = '';
    let i = 0;
    function printLine() {
      if (i < termLines.length) {
        terminalOutput.textContent += termLines[i] + '\n';
        i++;
        const delay = termLines[i-1] === '' ? 80 : 120 + Math.random() * 80;
        setTimeout(printLine, delay);
      } else {
        // Terminal "closes"
        setTimeout(() => {
          terminalScreen.style.display = 'none';
          screenOff.style.display = 'flex';
          powerBtn.classList.remove('on');
          screenState = 'done';
          // Show next page link
          setTimeout(() => {
            nextPage.style.display = 'flex';
          }, 800);
        }, 600);
      }
    }
    printLine();
  }

  // Clicking monitor area focuses input
  document.getElementById('monitor').addEventListener('click', () => {
    if (screenState === 'on') codeInput.focus();
  });

})();
</script>
