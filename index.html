<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERIDIA</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
  </style>
</head>
<body>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  #arg-root {
    width: 100vw;
    height: 100vh;
    background: #000;
    position: relative;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: default;
    user-select: none;
  }

  #office {
    position: absolute;
    inset: 0;
    background: #000;
    transition: background 2s ease;
  }

  #office.screen-off {
    background: #050504;
  }

  #office::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .office-item {
    position: absolute;
    opacity: 0;
    transition: opacity 2s ease;
    color: #1a1a14;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
  }

  .screen-off .office-item { opacity: 1; }

  #desk {
    bottom: 0; left: 0; right: 0; height: 22vh;
    background: #0a0905;
    border-top: 1px solid #111108;
  }

  #chair1 {
    bottom: 20vh; left: 8vw;
    width: 7vw; height: 14vh;
    background: #0c0b08;
    border: 1px solid #141310;
    border-radius: 4px 4px 0 0;
  }

  #chair2 {
    bottom: 19vh; right: 8vw;
    width: 6.5vw; height: 13vh;
    background: #0b0a07;
    border: 1px solid #131208;
    border-radius: 4px 4px 0 0;
  }

  .file {
    position: absolute;
    width: 4vw;
    height: 3vh;
    border-radius: 1px;
    transform-origin: center;
  }

  .file.gray   { background: #161613; border: 1px solid #1e1e1a; }
  .file.yellow { background: #1a190a; border: 1px solid #22210e; }
  .file.green  { background: #0a140a; border: 1px solid #101a10; }
  .file.blue   { background: #0a0d18; border: 1px solid #10122a; }
  .file.red    { background: #1a0a0a; border: 1px solid #2a1010; }

  #whiteboard {
    position: absolute;
    top: 8vh; right: 5vw;
    width: 16vw; height: 17vh;
    background: #0e0e0c;
    border: 1px solid #181815;
  }

  #whiteboard-content {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transition: opacity 3s ease 1s;
    color: #1e1e1c;
    font-size: 10px;
  }

  .screen-off #whiteboard-content { opacity: 1; }

  #name-circle {
    border: 1px solid #2a1212;
    border-radius: 50%;
    padding: 4px 8px;
    color: #251212;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap;
  }

  #cipher-paper {
    position: absolute;
    bottom: 24vh; left: 24vw;
    width: 8vw; height: 9vh;
    background: #131210;
    border: 1px solid #1c1b16;
    transform: rotate(-3deg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #1c1b15;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
    opacity: 0;
    transition: opacity 2s ease;
  }

  .screen-off #cipher-paper { opacity: 1; }

  #monitor-wrap {
    position: absolute;
    bottom: 20vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
  }

  #monitor {
    width: 28vw;
    height: 30vh;
    min-width: 260px;
    min-height: 200px;
    background: #050505;
    border: 2px solid #1a1a1a;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px #111;
  }

  #monitor-stand {
    width: 2vw; height: 3vh;
    min-width: 16px; min-height: 20px;
    background: #111;
    margin: 0 auto;
  }

  #monitor-base {
    width: 7vw; height: 6px;
    min-width: 60px;
    background: #111;
    border-radius: 2px;
  }

  #screen-off-state {
    position: absolute;
    inset: 0;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #screen-on-state {
    position: absolute;
    inset: 0;
    background: #0a120a;
    display: none;
    flex-direction: column;
  }

  #boot-screen {
    position: absolute;
    inset: 0;
    background: #e8e4dc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    opacity: 0;
  }

  #corp-logo {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: #1a1a2e;
    letter-spacing: 8px;
    margin-bottom: 6px;
  }

  #corp-tagline {
    font-size: 7px;
    color: #4a4a6a;
    letter-spacing: 3px;
    font-family: 'Share Tech Mono', monospace;
  }

  #corp-jingle-bar {
    width: 80%;
    height: 2px;
    background: #1a1a2e;
    margin-top: 14px;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.8s linear;
  }

  #code-screen {
    position: absolute;
    inset: 0;
    background: #060c06;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 3;
  }

  #code-prompt {
    font-size: 8px;
    color: #2a4a2a;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  #code-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #2a4a2a;
    color: #4aff4a;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    text-align: center;
    width: 160px;
    outline: none;
    caret-color: #4aff4a;
    letter-spacing: 3px;
  }

  #code-error {
    font-size: 7px;
    color: #4a1a1a;
    letter-spacing: 1px;
    height: 10px;
    transition: color 0.3s;
  }

  #code-error.show { color: #aa3333; }

  .screen-number {
    position: absolute;
    font-size: 7px;
    color: #0d150d;
    font-family: 'Share Tech Mono', monospace;
    pointer-events: none;
  }

  #terminal-screen {
    position: absolute;
    inset: 0;
    background: #020802;
    display: none;
    flex-direction: column;
    padding: 8px;
    overflow: hidden;
    z-index: 4;
  }

  #terminal-output {
    font-size: 7px;
    color: #1a3a1a;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1.6;
    white-space: pre;
  }

  #power-btn {
    position: absolute;
    bottom: 6px; right: 8px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #111;
    border: 1px solid #1e1e1e;
    cursor: pointer;
    z-index: 20;
    transition: background 0.3s, box-shadow 0.3s;
  }

  #power-btn.on {
    background: #0a2a0a;
    box-shadow: 0 0 4px #1a4a1a;
  }

  #mug {
    position: absolute;
    bottom: 26vh; right: 20vw;
    width: 2vw; height: 3vh;
    min-width: 14px; min-height: 16px;
    border: 1px solid #161410;
    border-radius: 0 0 3px 3px;
    background: #0e0c09;
    opacity: 0;
    transition: opacity 2s ease;
  }

  .screen-off #mug { opacity: 1; }

  #stapler {
    position: absolute;
    bottom: 25vh; left: 16vw;
    width: 3vw; height: 1.5vh;
    min-width: 24px; min-height: 8px;
    background: #0f0e0c;
    border: 1px solid #1a1917;
    border-radius: 2px;
    opacity: 0;
    transform: rotate(15deg);
    transition: opacity 2s ease;
  }

  .screen-off #stapler { opacity: 1; }

  #next-page {
    display: none;
    position: absolute;
    inset: 0;
    background: #000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 30;
  }

  #next-page a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #2a4a2a;
    letter-spacing: 4px;
    text-decoration: none;
    border-bottom: 1px solid #1a3a1a;
    padding-bottom: 2px;
    animation: blink 2s infinite;
  }

  #next-page-label {
    font-size: 8px;
    color: #1a2a1a;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes flicker {
    0% { opacity: 0; }
    10% { opacity: 0.9; }
    12% { opacity: 0.2; }
    14% { opacity: 0.95; }
    16% { opacity: 0.1; }
    18% { opacity: 1; }
    100% { opacity: 1; }
  }

  @keyframes screenFlicker {
    0% { opacity: 1; }
    30% { opacity: 0.6; }
    31% { opacity: 1; }
    60% { opacity: 0.8; }
    61% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>

<div id="arg-root">

  <div id="office">

    <div id="desk" class="office-item" style="opacity:0; transition: opacity 2s ease;"></div>
    <div id="chair1" class="office-item"></div>
    <div id="chair2" class="office-item"></div>

    <!-- Gray files -->
    <div class="file gray office-item" style="bottom:23vh; left:4vw;  transform:rotate(-8deg);"></div>
    <div class="file gray office-item" style="bottom:22vh; left:6vw;  transform:rotate(5deg);"></div>
    <div class="file gray office-item" style="bottom:23vh; right:26vw; transform:rotate(-12deg);"></div>
    <div class="file gray office-item" style="bottom:22vh; right:18vw; transform:rotate(3deg);"></div>
    <div class="file gray office-item" style="bottom:30vh; left:8vw;  transform:rotate(-5deg);"></div>
    <div class="file gray office-item" style="bottom:29vh; right:22vw; transform:rotate(-7deg);"></div>

    <!-- Yellow files -->
    <div class="file yellow office-item" style="bottom:31vh; left:9vw;  transform:rotate(8deg);"></div>
    <div class="file yellow office-item" style="bottom:22vh; right:27vw; transform:rotate(14deg);"></div>

    <!-- Green files -->
    <div class="file green office-item" style="bottom:23vh; left:14vw; transform:rotate(-4deg);"></div>

    <!-- Blue files -->
    <div class="file blue office-item" style="bottom:30vh; right:10vw; transform:rotate(-6deg);"></div>
    <div class="file blue office-item" style="bottom:30vh; right:23vw; transform:rotate(-3deg);"></div>

    <!-- Red files — 4 total, count = N = 4 -->
    <div class="file red office-item" style="bottom:23vh; left:11vw;  transform:rotate(6deg);"></div>
    <div class="file red office-item" style="bottom:23vh; right:32vw; transform:rotate(-9deg);"></div>
    <div class="file red office-item" style="bottom:31vh; left:5vw;   transform:rotate(2deg);"></div>
    <div class="file red office-item" style="bottom:31vh; right:20vw; transform:rotate(11deg);"></div>

    <div id="whiteboard" class="office-item">
      <div id="whiteboard-content">
        <div style="font-size:9px; color:#1a1816; letter-spacing:1px;">PERSONNEL</div>
        <div id="name-circle">Gaius.J.C</div>
      </div>
    </div>

    <div id="mug"></div>
    <div id="stapler"></div>
    <div id="cipher-paper">MQHMJJIRAF</div>

  </div>

  <div id="monitor-wrap">
    <div id="monitor">

      <div id="power-btn" title="Power"></div>

      <div id="screen-off-state">
        <div style="width:4px;height:4px;background:#0a0a0a;border-radius:50%;"></div>
      </div>

      <div id="boot-screen">
        <div id="corp-logo">VERIDIA</div>
        <div id="corp-tagline">CONNECTING PEOPLE. SECURING FUTURES.</div>
        <div id="corp-jingle-bar"></div>
      </div>

      <div id="code-screen">
        <div class="screen-number" style="top:12px; left:18px;">7</div>
        <div class="screen-number" style="top:28px; right:22px;">2</div>
        <div class="screen-number" style="bottom:20px; left:30px;">9</div>
        <div class="screen-number" style="bottom:14px; right:15px;">4</div>
        <div class="screen-number" style="top:50%; left:10px; transform:translateY(-50%);">1</div>
        <div id="code-prompt">ENTER ACCESS CODE</div>
        <input id="code-input" type="text" maxlength="20" autocomplete="off" spellcheck="false" placeholder="_ _ _ _ _ _ _ _ _ _" />
        <div id="code-error">INCORRECT PASSPHRASE</div>
      </div>

      <div id="terminal-screen">
        <div id="terminal-output"></div>
      </div>

    </div>
    <div id="monitor-stand"></div>
    <div id="monitor-base"></div>
  </div>

  <div id="next-page">
    <div id="next-page-label">ACCESS GRANTED — PROCEED</div>
    <a href="./chapter2/index.html">[ ENTER ]</a>
  </div>

</div>

<script>
(function(){
  const root = document.getElementById('arg-root');
  const office = document.getElementById('office');
  const powerBtn = document.getElementById('power-btn');
  const screenOff = document.getElementById('screen-off-state');
  const bootScreen = document.getElementById('boot-screen');
  const codeScreen = document.getElementById('code-screen');
  const terminalScreen = document.getElementById('terminal-screen');
  const terminalOutput = document.getElementById('terminal-output');
  const codeInput = document.getElementById('code-input');
  const codeError = document.getElementById('code-error');
  const nextPage = document.getElementById('next-page');
  const jingleBar = document.getElementById('corp-jingle-bar');
  const desk = document.getElementById('desk');

  let screenState = 'off';

  function createJingle(ctx) {
    const notes = [523, 659, 784, 1047, 880, 659];
    const times = [0, 0.12, 0.24, 0.36, 0.5, 0.62];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + times[i]);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + times[i] + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + times[i] + 0.11);
      osc.start(ctx.currentTime + times[i]);
      osc.stop(ctx.currentTime + times[i] + 0.12);
    });
  }

  function bootSequence() {
    if (screenState !== 'off') return;
    screenState = 'booting';
    powerBtn.classList.add('on');
    screenOff.style.display = 'none';
    bootScreen.style.display = 'flex';
    bootScreen.style.animation = 'flicker 0.4s ease forwards';

    setTimeout(() => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        createJingle(ctx);
        jingleBar.style.transform = 'scaleX(1)';
        setTimeout(() => {
          ctx.close();
          jingleBar.style.transition = 'none';
          jingleBar.style.transform = 'scaleX(0)';
          bootScreen.style.animation = 'screenFlicker 0.3s ease forwards';
          setTimeout(() => {
            bootScreen.style.display = 'none';
            codeScreen.style.display = 'flex';
            screenState = 'on';
            codeInput.focus();
          }, 300);
        }, 800);
      } catch(e) {
        setTimeout(() => {
          bootScreen.style.display = 'none';
          codeScreen.style.display = 'flex';
          screenState = 'on';
          codeInput.focus();
        }, 1200);
      }
    }, 400);
  }

  function powerDown() {
    if (screenState === 'terminal' || screenState === 'done') return;
    screenState = 'off';
    powerBtn.classList.remove('on');
    bootScreen.style.display = 'none';
    codeScreen.style.display = 'none';
    screenOff.style.display = 'flex';
    office.classList.add('screen-off');
    desk.style.opacity = '1';
  }

  powerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (screenState === 'off') {
      office.classList.remove('screen-off');
      desk.style.opacity = '0';
      setTimeout(bootSequence, 200);
    } else if (screenState === 'on') {
      powerDown();
    }
  });

  setTimeout(() => {
    office.classList.remove('screen-off');
    bootSequence();
  }, 2000);

  const ANSWER = 'indifferent';

  codeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = codeInput.value.trim().toLowerCase();
      if (val === ANSWER) {
        codeScreen.style.display = 'none';
        startTerminal();
      } else {
        codeError.classList.add('show');
        codeInput.value = '';
        setTimeout(() => codeError.classList.remove('show'), 2000);
      }
    }
  });

  const termLines = [
    'VERIDIA OS v4.2.1',
    'initializing secure shell...',
    'connecting to ARCHIVE_NODE_7...',
    '> auth bypass: ██████████ [OK]',
    '> decrypting employee manifest...',
    '> loading personnel files...',
    '',
    'WARNING: file integrity compromised',
    '> accessing: GAIUS.J.C / clearance L4',
    '> last login: 2019-03-14 03:41:22',
    '> status: ████████████',
    '',
    '> scanning incident_log_047.enc...',
    '> found: [REDACTED] entries',
    '> cross-referencing surveillance...',
    '',
    'ERROR: recursion limit reached',
    'ERROR: stack overflow in module auth_verify',
    'ERROR: connection unstable',
    '',
    '> dumping core to /dev/null',
    '> session terminated by remote host',
    '',
    'CONNECTION CLOSED.',
    '',
    '...',
  ];

  function startTerminal() {
    screenState = 'terminal';
    terminalScreen.style.display = 'flex';
    terminalOutput.textContent = '';
    let i = 0;
    function printLine() {
      if (i < termLines.length) {
        terminalOutput.textContent += termLines[i] + '\n';
        i++;
        const delay = termLines[i-1] === '' ? 80 : 120 + Math.random() * 80;
        setTimeout(printLine, delay);
      } else {
        setTimeout(() => {
          terminalScreen.style.display = 'none';
          screenOff.style.display = 'flex';
          powerBtn.classList.remove('on');
          screenState = 'done';
          setTimeout(() => {
            nextPage.style.display = 'flex';
          }, 800);
        }, 600);
      }
    }
    printLine();
  }

  document.getElementById('monitor').addEventListener('click', () => {
    if (screenState === 'on') codeInput.focus();
  });

})();
</script>

</body>
</html>
